name: Build LineageOS kernel for OnePlus Pad 3 / Pad 2 Pro (CachyOS/Arch self-hosted)

on:
  workflow_dispatch:

env:
  TZ: America/New_York

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: self-hosted
    env:
      CLANG_VERSION: clang-r547379
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 10G

    steps:
    - uses: actions/checkout@v4

    - name: Setup build kernel environment (CachyOS/Arch)
      run: |
        echo "BUILD_TIME=$(TZ=America/New_York date "+%y%m%d")" >> $GITHUB_ENV
        # Update package database and install missing build dependencies
        sudo pacman -Sy --needed --noconfirm \
          git base-devel ccache automake flex bison \
          ncurses bc dtc python make libelf pahole \
          curl wget tar xz
        # Create workspace
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace
        # Configure ccache
        ccache -M ${{ env.CCACHE_MAXSIZE }}
        ccache --set-config=compiler_check=content
        ccache --set-config=sloppiness=include_file_ctime,include_file_mtime,locale,pch_defines,time_macros
        ccache -s

    - name: Cache Clang toolchain
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/kernel_workspace/clang-aosp
        key: ${{ runner.os }}-${{ env.CLANG_VERSION }}

    - name: Download & extract Clang-aosp
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        mkdir -p clang-aosp
        wget -O ${CLANG_VERSION}.tar.gz \
          https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -C clang-aosp -zxvf ${CLANG_VERSION}.tar.gz

    - name: Cache ccache
      id: cache-ccache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ${{ runner.os }}-ccache-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ github.ref }}-
          ${{ runner.os }}-ccache-

    - name: Download kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive https://github.com/LineageOS/android_kernel_oneplus_sm8750 -b lineage-23.2 sm8750 --depth=1
        cd $GITHUB_WORKSPACE/kernel_workspace/sm8750/scripts
        sed -i 's/ -dirty//g' setlocalversion
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive https://github.com/LineageOS/android_kernel_oneplus_sm8750-modules -b lineage-23.2 sm8750-modules --depth=1
        sed -i '$a CONFIG_ERHAI_DTB=y' $GITHUB_WORKSPACE/kernel_workspace/sm8750/arch/arm64/configs/vendor/oplus/sun_perf.config
        sed -i '$a CONFIG_KSU=y' $GITHUB_WORKSPACE/kernel_workspace/sm8750/arch/arm64/configs/vendor/oplus/sun_perf.config
        sed -i '$a CONFIG_KSU_SUSFS=y' $GITHUB_WORKSPACE/kernel_workspace/sm8750/arch/arm64/configs/vendor/oplus/sun_perf.config

    - name: Setup official KernelSU-Next
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/sm8750
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s main
        KSU_VERSION=$(cd KernelSU-Next && expr $(/usr/bin/git rev-list --count HEAD) + 20000)
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV

    - name: Setup susfs4ksu
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/sm8750
        echo "Cloning susfs4ksu..."
        git clone --depth=1 -b gki-android15-6.6 https://gitlab.com/simonpunk/susfs4ksu.git
        echo "Copying patch files..."
        cp susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch KernelSU-Next/
        cp susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch 50_add_susfs_in_kernel.patch
        echo "Copying SUSFS source files..."
        cp susfs4ksu/kernel_patches/fs/* fs/
        cp susfs4ksu/kernel_patches/include/linux/* include/linux/
        echo "Applying KernelSU patch..."
        cd KernelSU-Next
        patch -p1 < 10_enable_susfs_for_ksu.patch || true
        echo "Applying kernel patch..."
        cd ..
        patch -p1 < 50_add_susfs_in_kernel.patch || true

    - name: Apply Wild Kernels patches
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/sm8750/KernelSU-Next
        echo "Cloning wildpatches..."
        git clone https://github.com/Liam314839/wildpatches
        echo "Applying Wild Kernels patches..."
        for patch in wildpatches/*.patch; do
          echo "Applying $patch"
          patch -p1 < "$patch" || true
        done
        echo "Wild Kernels patches applied successfully"

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/sm8750
        export ARCH=arm64
        export SUBARCH=arm64
        export HEADER_ARCH=arm64
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        export KBUILD_BUILD_HOST=CachyOS-SelfHosted
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
        export LLVM=1
        export LLVM_IAS=1

        # ccache wrapper
        export CCACHE_EXEC=/usr/bin/ccache

        AR_CMD="ARCH=${ARCH} SUBARCH=${SUBARCH} HEADER_ARCH=${HEADER_ARCH}"
        EX_CMD="LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump READELF=llvm-readelf OBJSIZE=llvm-size STRIP=llvm-strip"
        DEFCONFIG="gki_defconfig vendor/sun_perf.config vendor/oplus/sun_perf.config"

        make O=out $AR_CMD CC="ccache clang" CXX="ccache clang++" $EX_CMD $DEFCONFIG

        scripts/config --file out/.config -e LTO_CLANG -d LTO_NONE -e LTO_CLANG_THIN -d LTO_CLANG_FULL -e THINLTO

        make -j$(nproc --all) O=out $AR_CMD CC="ccache clang" CXX="ccache clang++" $EX_CMD

        echo "=== CCACHE STATS ==="
        ccache -s

    - name: Check kernel output files
      run: |
       cd $GITHUB_WORKSPACE/kernel_workspace
       if [ -f sm8750/out/arch/arm64/boot/Image ]; then
           echo "CHECK_IMAGE=true" >> $GITHUB_ENV
       else
           echo "Kernel output file is empty"
           exit 1
       fi

    - name: Make AnyKernel3
      if: env.CHECK_IMAGE == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/Kernel-SU/AnyKernel3 --depth=1
        rm -rf AnyKernel3/.git
        cp sm8750/out/arch/arm64/boot/Image AnyKernel3/

    - name: Upload Image
      if: env.CHECK_IMAGE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Image-Official-KSUN_${{ env.KSUVER }}
        path: kernel_workspace/sm8750/out/arch/arm64/boot/Image

    - name: Upload AnyKernel3
      if: env.CHECK_IMAGE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: AK3-LineageOS-23.2-Erhai-Official-KSUN_${{ env.KSUVER }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/AnyKernel3/*
